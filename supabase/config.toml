# Supabase local/dev config. Run `supabase link --project-ref YOUR_PROJECT_ID` from repo root.
# Edge function deploy only needs this file + supabase/functions/* — no Docker required for remote deploy.

project_id = "YOUR_PROJECT_REF"

[api]
enabled = true
port = 54321
schemas = ["public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 15

[studio]
enabled = true
port = 54323

[inbucket]
enabled = true
port = 54324

[storage]
enabled = true
file_size_limit = "50MiB"

[auth]
enabled = true
site_url = "http://127.0.0.1:3000"
additional_redirect_urls = []
jwt_expiry = 3600
enable_signup = true

# Per-function config (required format for current Supabase CLI)
[functions.bank-link]
verify_jwt = true

[functions.bank-sync]
verify_jwt = true

[functions.bank-unlink]
verify_jwt = true
