<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>Manage Travels</title>

  <link rel="icon" type="image/svg+xml" href="../assets/favicon.svg">
  <link rel="icon" type="image/x-icon" href="../assets/favicon.ico">
  <meta name="theme-color" content="#3b82f6">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: { extend: {
        fontFamily: { sans: ['Inter', 'system-ui', 'sans-serif'] },
        colors: { primary: { 50:'#eff6ff',100:'#dbeafe',200:'#bfdbfe',300:'#93c5fd',400:'#60a5fa',500:'#3b82f6',600:'#2563eb',700:'#1d4ed8',800:'#1e40af',900:'#1e3a8a' } }
      } }
    }
  </script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
    .gradient-text { background: linear-gradient(135deg,#3b82f6 0%,#8b5cf6 100%); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; }
    .gradient-bg { background: linear-gradient(135deg,#3b82f6 0%,#8b5cf6 100%); }
    .glass { background: rgba(255,255,255,0.8); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); }
    .dark .glass { background: rgba(15,23,42,0.8); }
    .theme-icon-light { color:#334155; } .dark .theme-icon-dark { color:#e2e8f0; }
  </style>
</head>
<body data-page="editor" class="bg-slate-50 dark:bg-slate-900 text-slate-900 dark:text-slate-100 font-sans transition-colors duration-300 overflow-x-hidden">

  <nav class="fixed top-0 left-0 right-0 z-40 glass border-b border-slate-200 dark:border-slate-700">
    <div class="max-w-5xl mx-auto px-4 sm:px-6 lg:px-8">
      <div class="flex items-center justify-between h-16">
        <a href="index.html" class="flex items-center gap-2 text-slate-600 dark:text-slate-300 hover:text-primary-600 dark:hover:text-primary-400 transition-colors font-medium text-sm">
          <i class="fas fa-arrow-left"></i> View site
        </a>
        <span class="text-lg font-bold gradient-text">Manage Travels</span>
        <button id="themeToggle" class="p-2.5 rounded-xl bg-slate-100 dark:bg-slate-800 text-slate-600 dark:text-slate-300 hover:bg-primary-500 hover:text-white transition-all" aria-label="Toggle theme">
          <i id="themeIcon" class="fas fa-yin-yang theme-icon-light"></i>
        </button>
      </div>
    </div>
  </nav>

  <main class="pt-20 sm:pt-24 pb-12 sm:pb-16 px-4 sm:px-6 lg:px-8">
    <div class="max-w-5xl mx-auto">

      <!-- Not configured -->
      <div id="notConfigured" class="hidden bg-amber-50 dark:bg-amber-900/20 border border-amber-200 dark:border-amber-800 rounded-2xl p-6 text-center">
        <i class="fas fa-triangle-exclamation text-2xl text-amber-500 mb-2"></i>
        <h2 class="font-bold text-lg">Cloud not configured</h2>
        <p class="text-sm text-slate-600 dark:text-slate-300 mt-1">Add <code>SUPABASE_URL</code> and <code>SUPABASE_ANON_KEY</code> to GitHub Secrets, then run <code>SUPABASE_TRAVEL_SETUP.sql</code>. See the setup notes in the repo.</p>
      </div>

      <!-- Login -->
      <div id="loginView" class="hidden max-w-md mx-auto">
        <div class="bg-white dark:bg-slate-800 rounded-3xl shadow-xl p-8 border border-slate-200 dark:border-slate-700">
          <div class="text-center mb-6">
            <div class="w-16 h-16 gradient-bg rounded-2xl flex items-center justify-center mx-auto mb-4 shadow-lg"><i class="fas fa-mountain-sun text-2xl text-white"></i></div>
            <h1 class="text-xl font-bold">Sign in to manage</h1>
            <p class="text-sm text-slate-500 dark:text-slate-400 mt-1">Owner access only.</p>
          </div>
          <form id="loginForm" class="space-y-4">
            <div>
              <label class="block text-sm font-medium mb-1">Email</label>
              <input id="email" type="email" autocomplete="email" required class="w-full px-3 py-2.5 bg-slate-50 dark:bg-slate-700 border border-slate-200 dark:border-slate-600 rounded-xl focus:outline-none focus:border-primary-500">
            </div>
            <div>
              <label class="block text-sm font-medium mb-1">Password</label>
              <input id="password" type="password" autocomplete="current-password" required class="w-full px-3 py-2.5 bg-slate-50 dark:bg-slate-700 border border-slate-200 dark:border-slate-600 rounded-xl focus:outline-none focus:border-primary-500">
            </div>
            <p id="loginError" class="hidden text-sm text-red-500"></p>
            <button id="loginBtn" type="submit" class="w-full py-2.5 gradient-bg text-white font-semibold rounded-xl hover:shadow-lg transition-all">Sign In</button>
          </form>
        </div>
      </div>

      <!-- Editor -->
      <div id="editorView" class="hidden">
        <div class="flex items-center justify-between mb-6">
          <h1 class="text-2xl font-bold">Your entries</h1>
          <div class="flex gap-2">
            <button id="newPostBtn" class="px-4 py-2.5 gradient-bg text-white font-semibold rounded-xl hover:shadow-lg transition-all text-sm"><i class="fas fa-plus mr-1"></i> New entry</button>
            <button id="signOutBtn" class="px-4 py-2.5 bg-slate-100 dark:bg-slate-800 rounded-xl text-sm font-medium hover:bg-slate-200 dark:hover:bg-slate-700">Sign out</button>
          </div>
        </div>
        <div id="postList" class="bg-white dark:bg-slate-800 rounded-2xl border border-slate-200 dark:border-slate-700 p-4"></div>
      </div>

    </div>
  </main>

  <!-- Form modal -->
  <div id="formModal" class="hidden fixed inset-0 z-50 bg-black/50 backdrop-blur-sm items-start justify-center p-2 sm:p-4 overflow-y-auto">
    <div class="bg-white dark:bg-slate-800 rounded-xl sm:rounded-2xl w-full max-w-2xl my-2 sm:my-8 shadow-2xl border border-slate-200 dark:border-slate-700">
      <div class="flex items-center justify-between p-4 sm:p-5 border-b border-slate-200 dark:border-slate-700 sticky top-0 bg-white dark:bg-slate-800 rounded-t-xl sm:rounded-t-2xl z-10">
        <h2 id="formTitle" class="text-lg font-bold">New entry</h2>
        <button id="closeFormBtn" class="w-9 h-9 rounded-lg hover:bg-slate-100 dark:hover:bg-slate-700"><i class="fas fa-times"></i></button>
      </div>
      <form id="postForm" class="p-4 sm:p-5 space-y-4">
        <div class="grid sm:grid-cols-2 gap-4">
          <div>
            <label class="block text-sm font-medium mb-1">Type</label>
            <select name="type" class="w-full px-3 py-2.5 bg-slate-50 dark:bg-slate-700 border border-slate-200 dark:border-slate-600 rounded-xl focus:outline-none focus:border-primary-500">
              <option value="hike">Hike</option>
              <option value="place">Place</option>
            </select>
          </div>
          <div>
            <label class="block text-sm font-medium mb-1">Date</label>
            <input name="date" type="date" class="w-full px-3 py-2.5 bg-slate-50 dark:bg-slate-700 border border-slate-200 dark:border-slate-600 rounded-xl focus:outline-none focus:border-primary-500">
          </div>
        </div>
        <div>
          <label class="block text-sm font-medium mb-1">Title <span class="text-red-400">*</span></label>
          <input name="title" required class="w-full px-3 py-2.5 bg-slate-50 dark:bg-slate-700 border border-slate-200 dark:border-slate-600 rounded-xl focus:outline-none focus:border-primary-500">
        </div>
        <div class="grid sm:grid-cols-2 gap-4">
          <div>
            <label class="block text-sm font-medium mb-1">Location</label>
            <input name="location" placeholder="Yosemite National Park, CA" class="w-full px-3 py-2.5 bg-slate-50 dark:bg-slate-700 border border-slate-200 dark:border-slate-600 rounded-xl focus:outline-none focus:border-primary-500">
          </div>
          <div>
            <label class="block text-sm font-medium mb-1">Region</label>
            <input name="region" placeholder="California" class="w-full px-3 py-2.5 bg-slate-50 dark:bg-slate-700 border border-slate-200 dark:border-slate-600 rounded-xl focus:outline-none focus:border-primary-500">
          </div>
        </div>
        <div class="grid sm:grid-cols-3 gap-4">
          <div>
            <label class="block text-sm font-medium mb-1">Rating (0–5)</label>
            <input name="rating" type="number" step="0.5" min="0" max="5" class="w-full px-3 py-2.5 bg-slate-50 dark:bg-slate-700 border border-slate-200 dark:border-slate-600 rounded-xl focus:outline-none focus:border-primary-500">
          </div>
          <div data-hike-field>
            <label class="block text-sm font-medium mb-1">Distance (km)</label>
            <input name="distance_km" type="number" step="0.1" min="0" class="w-full px-3 py-2.5 bg-slate-50 dark:bg-slate-700 border border-slate-200 dark:border-slate-600 rounded-xl focus:outline-none focus:border-primary-500">
          </div>
          <div data-hike-field>
            <label class="block text-sm font-medium mb-1">Elevation gain (m)</label>
            <input name="elevation_m" type="number" step="1" min="0" class="w-full px-3 py-2.5 bg-slate-50 dark:bg-slate-700 border border-slate-200 dark:border-slate-600 rounded-xl focus:outline-none focus:border-primary-500">
          </div>
        </div>
        <div class="grid sm:grid-cols-2 gap-4">
          <div data-hike-field>
            <label class="block text-sm font-medium mb-1">Difficulty</label>
            <select name="difficulty" class="w-full px-3 py-2.5 bg-slate-50 dark:bg-slate-700 border border-slate-200 dark:border-slate-600 rounded-xl focus:outline-none focus:border-primary-500">
              <option value="">—</option>
              <option value="easy">Easy</option>
              <option value="moderate">Moderate</option>
              <option value="hard">Hard</option>
              <option value="expert">Expert</option>
            </select>
          </div>
          <div>
            <label class="block text-sm font-medium mb-1">Duration</label>
            <input name="duration" placeholder="5h 30m / weekend" class="w-full px-3 py-2.5 bg-slate-50 dark:bg-slate-700 border border-slate-200 dark:border-slate-600 rounded-xl focus:outline-none focus:border-primary-500">
          </div>
        </div>
        <div>
          <label class="block text-sm font-medium mb-1">Tags <span class="text-slate-400 text-xs">(comma separated)</span></label>
          <input name="tags" placeholder="waterfall, dog-friendly, sunrise" class="w-full px-3 py-2.5 bg-slate-50 dark:bg-slate-700 border border-slate-200 dark:border-slate-600 rounded-xl focus:outline-none focus:border-primary-500">
        </div>

        <!-- Cover -->
        <div>
          <label class="block text-sm font-medium mb-1">Cover photo</label>
          <div id="coverPreview" class="relative"></div>
          <div class="flex items-center gap-3 mt-2">
            <label class="cursor-pointer px-3 py-2 text-sm rounded-lg bg-slate-100 dark:bg-slate-700 hover:bg-slate-200 dark:hover:bg-slate-600">
              <i class="fas fa-upload mr-1"></i> Choose file
              <input id="coverInput" type="file" accept="image/*" class="hidden">
            </label>
            <span id="coverStatus" class="text-xs text-slate-500"></span>
          </div>
        </div>

        <!-- Gallery -->
        <div>
          <label class="block text-sm font-medium mb-1">Gallery photos</label>
          <div id="galleryPreview" class="grid grid-cols-3 sm:grid-cols-4 gap-2"></div>
          <div class="flex items-center gap-3 mt-2">
            <label class="cursor-pointer px-3 py-2 text-sm rounded-lg bg-slate-100 dark:bg-slate-700 hover:bg-slate-200 dark:hover:bg-slate-600">
              <i class="fas fa-images mr-1"></i> Add photos
              <input id="galleryInput" type="file" accept="image/*" multiple class="hidden">
            </label>
            <span id="galleryStatus" class="text-xs text-slate-500"></span>
          </div>
        </div>

        <div>
          <label class="block text-sm font-medium mb-1">Summary <span class="text-slate-400 text-xs">(short blurb on cards)</span></label>
          <textarea name="summary" rows="2" class="w-full px-3 py-2.5 bg-slate-50 dark:bg-slate-700 border border-slate-200 dark:border-slate-600 rounded-xl focus:outline-none focus:border-primary-500"></textarea>
        </div>
        <div>
          <label class="block text-sm font-medium mb-1">Writeup <span class="text-slate-400 text-xs">(Markdown: ## heading, **bold**, *italic*, - list, [link](url))</span></label>
          <textarea name="body" rows="8" class="w-full px-3 py-2.5 bg-slate-50 dark:bg-slate-700 border border-slate-200 dark:border-slate-600 rounded-xl focus:outline-none focus:border-primary-500 font-mono text-sm"></textarea>
        </div>
        <label class="flex items-center gap-2 text-sm">
          <input name="published" type="checkbox" class="w-4 h-4 rounded"> Published (visible to visitors)
        </label>

        <div class="flex justify-end gap-2 pt-2 border-t border-slate-200 dark:border-slate-700">
          <button type="button" id="cancelFormBtn" class="px-4 py-2.5 bg-slate-100 dark:bg-slate-700 rounded-xl text-sm font-medium hover:bg-slate-200 dark:hover:bg-slate-600">Cancel</button>
          <button type="submit" id="saveBtn" class="px-5 py-2.5 gradient-bg text-white font-semibold rounded-xl hover:shadow-lg transition-all text-sm">Save entry</button>
        </div>
      </form>
    </div>
  </div>

  <script src="js/travel-config.js"></script>
  <script src="js/travel-owner.js"></script>
  <script src="js/travel-owner-config.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/travel.js"></script>
</body>
</html>
