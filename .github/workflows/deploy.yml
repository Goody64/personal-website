name: Deploy to GitHub Pages

on:
  push:
    branches: [main, master]

permissions:
  contents: read
  pages: write
  id-token: write

# Only the latest push deploys; older runs are cancelled so you're not stuck behind a queue
concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: github-pages
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create admin config from secrets
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          SIGNUP_ACCESS_KEY: ${{ secrets.SIGNUP_ACCESS_KEY }}
          TRAVEL_OWNER_EMAIL: ${{ secrets.TRAVEL_OWNER_EMAIL }}
          TRAVEL_OWNER_ID: ${{ secrets.TRAVEL_OWNER_ID }}
        run: |
          node -e "
            const fs = require('fs');
            const supabase = (process.env.SUPABASE_URL && process.env.SUPABASE_ANON_KEY)
              ? { url: process.env.SUPABASE_URL, anonKey: process.env.SUPABASE_ANON_KEY }
              : null;
            const signupKey = process.env.SIGNUP_ACCESS_KEY || '';
            const out = (supabase ? 'const SUPABASE_CONFIG = ' + JSON.stringify(supabase, null, 2) + ';' : 'const SUPABASE_CONFIG = null;')
              + '\n' + 'const SIGNUP_ACCESS_KEY = ' + JSON.stringify(signupKey) + ';';
            fs.writeFileSync('lifelog/js/admin-config.js', out);
            const travel = (process.env.SUPABASE_URL && process.env.SUPABASE_ANON_KEY)
              ? { url: process.env.SUPABASE_URL, anonKey: process.env.SUPABASE_ANON_KEY }
              : null;
            const travelOut = (travel ? 'const SUPABASE_CONFIG = ' + JSON.stringify(travel, null, 2) + ';' : 'const SUPABASE_CONFIG = null;');
            fs.writeFileSync('travel/js/travel-config.js', travelOut);
            const ownerEmail = process.env.TRAVEL_OWNER_EMAIL || '';
            const ownerId = process.env.TRAVEL_OWNER_ID || '';
            const ownerOut = 'window.TRAVEL_OWNER_EMAIL = ' + JSON.stringify(ownerEmail.toLowerCase()) + ';\\n'
              + 'window.TRAVEL_OWNER_ID = ' + JSON.stringify(ownerId) + ';\\n';
            fs.writeFileSync('travel/js/travel-owner-config.js', ownerOut);
          "

      - name: Cache-bust scripts for faster propagation
        run: |
          BUILD="${{ github.sha }}"
          for f in lifelog/dashboard.html lifelog/index.html; do
            sed -i "s|js/admin.js\"|js/admin.js?v=${BUILD}\"|g" "$f"
            sed -i "s|js/dataService.js\"|js/dataService.js?v=${BUILD}\"|g" "$f"
            sed -i "s|js/lifeerp-extensions.js\"|js/lifeerp-extensions.js?v=${BUILD}\"|g" "$f"
          done
          sed -i "s|__BUILD__|${BUILD}|g" lifelog/sw.js
          sed -i "s|__BUILD__|${BUILD}|g" travel/sw.js
          sed -i "s|__BUILD__|${BUILD}|g" sw.js
          for f in travel/index.html travel/post.html travel/editor.html; do
            sed -i "s|js/travel.js\"|js/travel.js?v=${BUILD}\"|g" "$f"
          done

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
