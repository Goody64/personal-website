<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Jacob Goodman's travels — hikes, places, and reviews from the road and trail.">
  <title>Travels | Jacob Goodman</title>

  <link rel="icon" type="image/svg+xml" href="../assets/favicon.svg">
  <link rel="icon" type="image/x-icon" href="../assets/favicon.ico">
  <meta name="theme-color" content="#3b82f6">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: { extend: {
        fontFamily: { sans: ['Inter', 'system-ui', 'sans-serif'] },
        colors: { primary: { 50:'#eff6ff',100:'#dbeafe',200:'#bfdbfe',300:'#93c5fd',400:'#60a5fa',500:'#3b82f6',600:'#2563eb',700:'#1d4ed8',800:'#1e40af',900:'#1e3a8a' } }
      } }
    }
  </script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
    .gradient-text { background: linear-gradient(135deg,#3b82f6 0%,#8b5cf6 100%); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; }
    .gradient-bg { background: linear-gradient(135deg,#3b82f6 0%,#8b5cf6 100%); }
    .glass { background: rgba(255,255,255,0.8); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); }
    .dark .glass { background: rgba(15,23,42,0.8); }
    .card-hover { transition: all .3s ease; }
    .card-hover:hover { transform: translateY(-4px); box-shadow: 0 20px 40px rgba(0,0,0,.12); }
    .dark .card-hover:hover { box-shadow: 0 20px 40px rgba(0,0,0,.35); }
    .theme-icon-light { color:#334155; } .dark .theme-icon-dark { color:#e2e8f0; }
    .line-clamp-2 { display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden; }
    .hero-photo { background: linear-gradient(135deg,#3b82f6,#8b5cf6); }
  </style>
</head>
<body data-page="home" class="bg-slate-50 dark:bg-slate-900 text-slate-900 dark:text-slate-100 font-sans transition-colors duration-300 overflow-x-hidden">

  <!-- Nav -->
  <nav class="fixed top-0 left-0 right-0 z-50 glass border-b border-slate-200 dark:border-slate-700">
    <div class="max-w-6xl mx-auto px-4 sm:px-6 lg:px-8">
      <div class="flex items-center justify-between h-16">
        <a href="../" class="flex items-center gap-2 text-slate-600 dark:text-slate-300 hover:text-primary-600 dark:hover:text-primary-400 transition-colors font-medium text-sm">
          <i class="fas fa-arrow-left"></i> <span class="hidden sm:inline">Back to portfolio</span>
        </a>
        <a href="index.html" class="text-lg font-bold gradient-text">Travels</a>
        <div class="flex items-center gap-2">
          <a href="editor.html" title="Sign in to manage entries" class="p-2.5 rounded-xl bg-slate-100 dark:bg-slate-800 text-slate-600 dark:text-slate-300 hover:bg-primary-500 hover:text-white transition-all"><i class="fas fa-lock"></i></a>
          <button id="themeToggle" class="p-2.5 rounded-xl bg-slate-100 dark:bg-slate-800 text-slate-600 dark:text-slate-300 hover:bg-primary-500 hover:text-white transition-all" aria-label="Toggle theme">
            <i id="themeIcon" class="fas fa-yin-yang theme-icon-light"></i>
          </button>
        </div>
      </div>
    </div>
  </nav>

  <!-- Hero -->
  <header class="pt-24 pb-8 px-4 sm:px-6 lg:px-8">
    <div class="max-w-6xl mx-auto text-center">
      <h1 class="text-3xl sm:text-5xl font-extrabold"><span class="gradient-text">Hikes &amp; Places</span></h1>
      <p class="text-slate-500 dark:text-slate-400 mt-3 max-w-2xl mx-auto text-sm sm:text-base">A running log of trails I've hiked and places I've been — part journal, part review.</p>
    </div>
  </header>

  <!-- Controls -->
  <section class="px-4 sm:px-6 lg:px-8">
    <div class="max-w-6xl mx-auto">
      <div class="bg-white dark:bg-slate-800 rounded-2xl border border-slate-200 dark:border-slate-700 p-4 shadow-sm space-y-3">
        <!-- Search -->
        <div class="relative">
          <i class="fas fa-magnifying-glass absolute left-4 top-1/2 -translate-y-1/2 text-slate-400"></i>
          <input id="searchInput" type="search" placeholder="Search trails, places, tags…" class="w-full pl-11 pr-4 py-2.5 bg-slate-50 dark:bg-slate-700 border border-slate-200 dark:border-slate-600 rounded-xl focus:outline-none focus:border-primary-500">
        </div>
        <!-- Type filter + sort (row) -->
        <div class="flex gap-2 items-center">
          <div class="flex gap-1 bg-slate-100 dark:bg-slate-900/50 rounded-xl p-1 flex-shrink-0">
            <button data-type-filter="all" class="px-2.5 py-1.5 text-xs sm:text-sm rounded-lg font-medium bg-primary-500 text-white">All</button>
            <button data-type-filter="hike" class="px-2.5 py-1.5 text-xs sm:text-sm rounded-lg font-medium bg-slate-100 dark:bg-slate-800 text-slate-600 dark:text-slate-300"><i class="fas fa-person-hiking mr-1"></i>Hikes</button>
            <button data-type-filter="place" class="px-2.5 py-1.5 text-xs sm:text-sm rounded-lg font-medium bg-slate-100 dark:bg-slate-800 text-slate-600 dark:text-slate-300"><i class="fas fa-location-dot mr-1"></i>Places</button>
          </div>
          <select id="sortSelect" class="flex-1 min-w-0 px-3 py-2 bg-slate-50 dark:bg-slate-700 border border-slate-200 dark:border-slate-600 rounded-xl text-sm focus:outline-none focus:border-primary-500">
            <option value="newest">Newest</option>
            <option value="oldest">Oldest</option>
            <option value="rating">Top rated</option>
            <option value="distance">Longest</option>
            <option value="title">A–Z</option>
          </select>
        </div>
        <!-- Tag + rating (2-col on mobile) -->
        <div class="grid grid-cols-2 gap-2">
          <select id="tagFilter" class="px-3 py-2 bg-slate-50 dark:bg-slate-700 border border-slate-200 dark:border-slate-600 rounded-xl text-sm focus:outline-none focus:border-primary-500 w-full"><option value="">All tags</option></select>
          <select id="ratingFilter" class="px-3 py-2 bg-slate-50 dark:bg-slate-700 border border-slate-200 dark:border-slate-600 rounded-xl text-sm focus:outline-none focus:border-primary-500 w-full">
            <option value="0">Any rating</option>
            <option value="3">3+ stars</option>
            <option value="4">4+ stars</option>
            <option value="4.5">4.5+ stars</option>
          </select>
        </div>
        <p id="countLabel" class="text-xs text-slate-400"></p>
      </div>
    </div>
  </section>

  <!-- Grid -->
  <main class="px-4 sm:px-6 lg:px-8 py-6 sm:py-8">
    <div class="max-w-6xl mx-auto">
      <div id="loadingState" class="text-center py-24 text-slate-400"><i class="fas fa-spinner fa-spin text-3xl"></i><p class="mt-3 text-sm">Loading trips…</p></div>
      <div id="grid" class="grid sm:grid-cols-2 lg:grid-cols-3 gap-4 sm:gap-6"></div>
      <div id="emptyState" class="hidden text-center py-24">
        <i class="fas fa-mountain-sun text-5xl text-slate-300 dark:text-slate-600 mb-4"></i>
        <h2 data-empty-title class="text-xl font-bold text-slate-900 dark:text-white">No matching trips</h2>
        <p class="text-slate-500 dark:text-slate-400 mt-2">Try clearing the search or filters.</p>
      </div>
    </div>
  </main>

  <footer class="border-t border-slate-200 dark:border-slate-700 py-8 px-4 text-center text-sm text-slate-400">
    <p>© <span id="year"></span> Jacob Goodman</p>
  </footer>

  <script>document.getElementById('year').textContent = new Date().getFullYear();</script>
  <script src="js/travel-config.js"></script>
  <script src="js/travel-owner.js"></script>
  <script src="js/travel-owner-config.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/travel.js"></script>
</body>
</html>
